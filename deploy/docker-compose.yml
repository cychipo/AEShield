services:
  mongo:
    image: mongo:7
    container_name: aeshield-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_BOOTSTRAP_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_BOOTSTRAP_ROOT_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin?authSource=admin --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${MONGO_PUBLIC_PORT:-27020}:27017"
    volumes:
      - mongo-data:/data/db

  mongo-reconcile:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /workspace
    env_file:
      - ./.env
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
    volumes:
      - ../scripts:/workspace/scripts:ro
    entrypoint: ["/bin/sh", "/workspace/scripts/mongo/run-reconcile.sh"]
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      mongo:
        condition: service_healthy
      mongo-reconcile:
        condition: service_completed_successfully
    env_file:
      - ./.env
    restart: unless-stopped
    expose:
      - "8010"
    ports:
      - "${BACKEND_PUBLIC_PORT:-8010}:8010"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PUBLIC_PORT:-5191}:5191"
    restart: unless-stopped

volumes:
  mongo-data:
